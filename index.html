<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0000ff" />
    <title>Absensi</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="headerTitle">
        Absensi Jabar Berseka Sekretariat DPRD Provinsi Jawa Barat
      </h1>

      <!-- MENU -->
      <div id="menu">
        <button type="button" onclick="pilihBagian('FASGARWAS')">
          FASGARWAS
        </button>
        <button type="button" onclick="pilihBagian('UMUM')">UMUM</button>
        <button type="button" onclick="pilihBagian('PUU')">PUU</button>
        <button type="button" onclick="pilihBagian('PK')">
          PROGRAM KEUANGAN
        </button>
      </div>

      <!-- FORM ABSEN -->
      <div id="formAbsen" class="hidden">
        <h2 id="judul"></h2>

        <input
          list="listNama"
          id="nama"
          placeholder="Cari nama..."
          autocomplete="off"
        />
        <datalist id="listNama"></datalist>
        <input type="text" id="nip" placeholder="NIP" readonly />

        <!-- JABATAN -->
        <h3>Jabatan</h3>
        <input type="text" id="jabatanText" placeholder="Jabatan" readonly />

        <!-- FOTO -->
        <h3>Foto Bukti Absen</h3>
        <label class="camera-box">
          <input
            type="file"
            id="foto"
            accept="image/*"
            capture="environment"
            hidden
          />
          <div id="previewBox">
            📷
            <p>Ambil Foto</p>
            <p style="font-size: 12px; color: #888">Maks ukuran foto 5MB</p>
          </div>
        </label>

        <button type="button" class="btn btn-submit" onclick="submitAbsen()">
          ✅ Submit
        </button>
        <button type="button" class="btn btn-warning" onclick="pegawaiBaru()">
          ⚠️ Nama tidak ditemukan?
        </button>
        <button type="button" class="btn btn-back" onclick="kembaliMenu()">
          ⬅ Kembali
        </button>
      </div>

      <div
        id="popupSuccess"
        style="
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: #4caf50;
          color: white;
          padding: 20px 30px;
          border-radius: 10px;
          display: none;
          z-index: 9999;
          font-weight: bold;
        "
      >
        ✅ Absen berhasil!
      </div>

      <!-- FORM PEGAWAI BARU -->
      <div id="formBaru" class="hidden">
        <h2>Pengguna Baru</h2>

        <input
          type="text"
          id="namaBaru"
          placeholder="Nama Lengkap"
          autocomplete="off"
        />

        <input
          type="text"
          id="nipBaru"
          placeholder="NIP (isi ( - ) jika outsourcing)"
          autocomplete="off"
          inputmode="numeric"
        />

        <h3>Jabatan</h3>
        <div class="jabatan-group">
          <label class="jabatan-card">
            <input type="radio" name="jabatanBaru" value="PNS" required />
            <span>PNS</span>
          </label>

          <label class="jabatan-card">
            <input type="radio" name="jabatanBaru" value="PPPK" required />
            <span>PPPK</span>
          </label>

          <label class="jabatan-card">
            <input
              type="radio"
              name="jabatanBaru"
              value="Outsourcing"
              required
            />
            <span>Outsourcing</span>
          </label>
        </div>

        <button type="button" class="btn btn-submit" onclick="submitBaru()">
          SUBMIT
        </button>
        <button type="button" class="btn btn-back" onclick="kembaliKeAbsen()">
          ⬅ Kembali
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
      import {
        getDatabase,
        ref,
        get,
        push,
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
      import {
        getStorage,
        ref as sRef,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDATx32DvfsxvRSk85xGctR5uf0P62xUOA",
        authDomain: "jabarberseka-d4655.firebaseapp.com",
        databaseURL:
          "https://jabarberseka-d4655-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jabarberseka-d4655",
        storageBucket: "jabarberseka-d4655.firebasestorage.app",
        messagingSenderId: "989165164455",
        appId: "1:989165164455:web:7c1b6d7aeab7c73db74882",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const storage = getStorage(app);

      window.db = db;
      window.ref = ref;
      window.get = get;
      window.push = push;

      window.storage = storage;
      window.sRef = sRef;
      window.uploadBytes = uploadBytes;
      window.getDownloadURL = getDownloadURL;
    </script>

    <script src="script.js"></script>
  </body>
</html>
